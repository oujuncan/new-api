name: Publish Docker image (GHCR model health)

on:
  push:
    branches:
      - feat/model-health-monitoring
  workflow_dispatch:
    inputs:
      tag:
        description: "Docker tag suffix"
        required: false
        default: "model-health"

jobs:
  build:
    name: Build and push GHCR image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Prepare image metadata
        id: meta-vars
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"
          SHORT_SHA="$(git rev-parse --short HEAD)"
          RAW_TAG="${{ github.event.inputs.tag || 'model-health' }}"
          SAFE_TAG="$(echo "$RAW_TAG" | tr '/[:upper:]' '-[:lower:]' | sed 's/[^a-z0-9_.-]/-/g')"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "safe_tag=$SAFE_TAG" >> "$GITHUB_OUTPUT"
          echo "$SAFE_TAG-$SHORT_SHA" > VERSION

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.meta-vars.outputs.image }}
          tags: |
            type=raw,value=${{ steps.meta-vars.outputs.safe_tag }}
            type=raw,value=${{ steps.meta-vars.outputs.safe_tag }}-${{ steps.meta-vars.outputs.short_sha }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      - name: Summary
        run: |
          echo "### Published image" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
